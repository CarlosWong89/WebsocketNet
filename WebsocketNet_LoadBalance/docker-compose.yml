version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ws1
      - ws2
      - ws3

  ws1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ws1
    environment:
      - NODE_NAME=ws1
    ports:
      - "5001:8080"

  ws2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ws2
    environment:
      - NODE_NAME=ws2
    ports:
      - "5002:8080"

  ws3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ws3
    environment:
      - NODE_NAME=ws3
    ports:
      - "5003:8080"
