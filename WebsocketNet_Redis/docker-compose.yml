version: "3.9"

services:

  nginx:
    image: nginx:latest
    container_name: nginx_lb
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ws1
      - ws2
      - ws3

  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    restart: unless-stopped

  ws1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ws1
    environment:
      - NODE_NAME=ws1
    ports:
      - "5001:8080"
    depends_on:
      - redis

  ws2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ws2
    environment:
      - NODE_NAME=ws2
    ports:
      - "5002:8080"
    depends_on:
      - redis

  ws3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ws3
    environment:
      - NODE_NAME=ws3
    ports:
      - "5003:8080"
    depends_on:
      - redis

volumes:
  redis_data:
  redisinsight_data: